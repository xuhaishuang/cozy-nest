<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ========== RENDERER ==========
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ========== SCENE & CAMERA ==========
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0806);
scene.fog=new THREE.FogExp2(0x1a1510,0.00008);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.3,30);
camera.position.set(3.5,2.2,5.5);
camera.lookAt(0.5,1.3,0);

// ========== POST PROCESSING ==========
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.3,0.85);
bloomPass.threshold=0.7;bloomPass.strength=0.12;bloomPass.radius=0.8;
composer.addPass(bloomPass);

// ========== LIGHTING ==========
// Warm ambient - simulates light bouncing off warm surfaces
scene.add(new THREE.AmbientLight(0x2a1a10,1.2));

// Main sunlight through window - warm golden
const sunLight=new THREE.DirectionalLight(0xffe0b0,10);
sunLight.position.set(-3,5,2);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(2048,2048);
sunLight.shadow.camera.near=0.3;sunLight.shadow.camera.far=18;
sunLight.shadow.camera.left=-6;sunLight.shadow.camera.right=6;
sunLight.shadow.camera.top=5;sunLight.shadow.camera.bottom=-3;
sunLight.shadow.bias=-0.0002;sunLight.shadow.normalBias=0.02;
scene.add(sunLight);

// Subtle blue fill from window
const fillLight=new THREE.DirectionalLight(0xaaccff,2.5);
fillLight.position.set(-2,3,4);scene.add(fillLight);

// Warm lamp glow
const lampLight=new THREE.PointLight(0xffb870,10,4,1.5);
lampLight.position.set(1.5,1.6,-1.5);
lampLight.castShadow=true;
lampLight.shadow.mapSize.set(512,512);
lampLight.shadow.camera.near=0.2;lampLight.shadow.camera.far=8;
lampLight.shadow.bias=-0.003;
scene.add(lampLight);

// Secondary warm glow near armchair
const cozyLight=new THREE.PointLight(0xff9940,4,2.5);
cozyLight.position.set(-0.5,0.6,0.8);scene.add(cozyLight);

// ========== ROOM ==========
const room=new THREE.Group();scene.add(room);

// Floor - warm wood planks
const floorGeo=new THREE.PlaneGeometry(7,6.5);
const floorMat=new THREE.MeshStandardMaterial({color:0x4a3020,roughness:0.55,metalness:0.02});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor.position.y=-0.01;floor.receiveShadow=true;
room.add(floor);

// Floor rug
const rugGeo=new THREE.CylinderGeometry(1.2,1.3,0.03,32);
const rugMat=new THREE.MeshStandardMaterial({color:0xd4c0a0,roughness:0.85,metalness:0});
const rug=new THREE.Mesh(rugGeo,rugMat);
rug.position.set(0.2,0.01,0.5);rug.receiveShadow=true;room.add(rug);

// Back wall
const backWallGeo=new THREE.PlaneGeometry(7,3.6);
const wallMat=new THREE.MeshStandardMaterial({color:0xf0e8d8,roughness:0.75,metalness:0});
const backWall=new THREE.Mesh(backWallGeo,wallMat);
backWall.position.set(0,1.8,-3.2);backWall.receiveShadow=true;room.add(backWall);

// Left wall
const leftWall=new THREE.Mesh(new THREE.PlaneGeometry(6.5,3.6),wallMat);
leftWall.rotation.y=Math.PI/2;leftWall.position.set(-3.5,1.8,0);leftWall.receiveShadow=true;room.add(leftWall);

// Right wall
const rightWall=new THREE.Mesh(new THREE.PlaneGeometry(6.5,3.6),wallMat);
rightWall.rotation.y=-Math.PI/2;rightWall.position.set(3.5,1.8,0);rightWall.receiveShadow=true;room.add(rightWall);

// Ceiling
const ceilGeo=new THREE.PlaneGeometry(7,6.5);
const ceilMat=new THREE.MeshStandardMaterial({color:0xf8f2e8,roughness:0.7,metalness:0});
const ceiling=new THREE.Mesh(ceilGeo,ceilMat);
ceiling.rotation.x=Math.PI/2;ceiling.position.y=3.6;room.add(ceiling);

// ========== WINDOW ==========
const windowGroup=new THREE.Group();windowGroup.position.set(-3.48,2,0.3);room.add(windowGroup);

// Window hole (dark)
const winHoleGeo=new THREE.PlaneGeometry(1.4,1.8);
const winHoleMat=new THREE.MeshBasicMaterial({color:0x8899cc});
const winHole=new THREE.Mesh(winHoleGeo,winHoleMat);
windowGroup.add(winHole);

// Window frame
const frameMat=new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.45,metalness:0.05});
function addFrame(w,h,x,y){
  const f=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.08),frameMat);
  f.position.set(x,y,0.04);f.castShadow=true;windowGroup.add(f);
}
addFrame(1.5,0.08,0,0.9);  // top
addFrame(1.5,0.08,0,-0.9); // bottom
addFrame(0.08,1.9,-0.71,0); // left
addFrame(0.08,1.9,0.71,0);  // right
// Cross bars
addFrame(0.06,1.9,0,0);     // vertical center
addFrame(1.5,0.06,0,0.4);   // horizontal upper
addFrame(1.5,0.06,0,-0.4);  // horizontal lower

// Window light beam (volumetric)
const beamGeo=new THREE.CylinderGeometry(0.01,1.2,3.5,8,1,true);
const beamMat=new THREE.MeshBasicMaterial({color:0xffe8c0,transparent:true,opacity:0.02,side:THREE.DoubleSide,depthWrite:false});
const beam=new THREE.Mesh(beamGeo,beamMat);
beam.position.set(-3.4,1.5,1.8);beam.rotation.z=Math.PI/2;beam.rotation.y=0.3;
room.add(beam);

// Curtains
const curtainGeo=new THREE.PlaneGeometry(0.35,2);
const curtainMat=new THREE.MeshStandardMaterial({color:0xe8ddd0,roughness:0.7,metalness:0,side:THREE.DoubleSide,transparent:true,opacity:0.85});
for(let sx of[-1,1]){
  const c=new THREE.Mesh(curtainGeo,curtainMat);
  c.position.set(-3.4,2,0.3+sx*0.8);c.rotation.y=sx*0.2;
  room.add(c);
}

// ========== ARMCHAIR ==========
const chairGroup=new THREE.Group();chairGroup.position.set(-0.8,0,-0.5);chairGroup.rotation.y=-0.3;room.add(chairGroup);
const chairMat=new THREE.MeshStandardMaterial({color:0xc47a50,roughness:0.7,metalness:0.02});

// Seat cushion
const seatGeo=new THREE.BoxGeometry(0.9,0.25,0.8);
const seat=new THREE.Mesh(seatGeo,chairMat);
seat.position.y=0.45;seat.castShadow=true;seat.receiveShadow=true;chairGroup.add(seat);

// Backrest
const backGeo=new THREE.BoxGeometry(0.85,0.7,0.2);
const back=new THREE.Mesh(backGeo,chairMat);
back.position.set(0,0.8,-0.35);back.castShadow=true;chairGroup.add(back);

// Left armrest
const armGeo=new THREE.BoxGeometry(0.12,0.2,0.7);
for(let sx of[-1,1]){
  const arm=new THREE.Mesh(armGeo,chairMat);
  arm.position.set(sx*0.42,0.5,0);arm.castShadow=true;chairGroup.add(arm);
}

// Cushion on chair
const cushGeo=new THREE.SphereGeometry(0.22,16,12);cushGeo.scale(1,0.4,0.8);
const cushMat=new THREE.MeshStandardMaterial({color:0xe8d5b8,roughness:0.75,metalness:0});
const cushion=new THREE.Mesh(cushGeo,cushMat);
cushion.position.set(0.1,0.62,-0.1);chairGroup.add(cushion);

// ========== SIDE TABLE ==========
const tableGroup=new THREE.Group();tableGroup.position.set(0.8,0,-1);room.add(tableGroup);
const woodMat=new THREE.MeshStandardMaterial({color:0x5a3a20,roughness:0.4,metalness:0.05});

// Table top
const topGeo=new THREE.CylinderGeometry(0.28,0.3,0.04,24);
const top=new THREE.Mesh(topGeo,woodMat);
top.position.y=0.75;top.castShadow=true;top.receiveShadow=true;tableGroup.add(top);
// Leg
const legGeo=new THREE.CylinderGeometry(0.04,0.05,0.7,12);
const legTop=new THREE.Mesh(legGeo,woodMat);
legTop.position.y=0.4;legTop.castShadow=true;tableGroup.add(legTop);

// ========== TABLE LAMP ==========
const lampGroup=new THREE.Group();lampGroup.position.set(0.8,0.77,-1);room.add(lampGroup);

// Lamp base
const baseGeo=new THREE.CylinderGeometry(0.08,0.1,0.12,16);
const baseMat=new THREE.MeshStandardMaterial({color:0xc8b898,roughness:0.3,metalness:0.3});
const base=new THREE.Mesh(baseGeo,baseMat);base.position.y=0;lampGroup.add(base);

// Lamp shade
const shadeGeo=new THREE.CylinderGeometry(0.12,0.25,0.4,24,1,true);
const shadeMat=new THREE.MeshStandardMaterial({color:0xf5ead8,roughness:0.5,metalness:0,side:THREE.DoubleSide,emissive:0x221100,emissiveIntensity:0.3});
const shade=new THREE.Mesh(shadeGeo,shadeMat);
shade.position.y=0.3;shade.castShadow=true;lampGroup.add(shade);

// ========== BOOKSHELF ==========
const shelfGroup=new THREE.Group();shelfGroup.position.set(3,0,-1.5);room.add(shelfGroup);
const shelfMat=new THREE.MeshStandardMaterial({color:0x5a3a20,roughness:0.4,metalness:0.05});

// Frame
for(let i=0;i<4;i++){
  const shelf=new THREE.Mesh(new THREE.BoxGeometry(1,0.04,0.35),shelfMat);
  shelf.position.y=0.3+i*0.8;shelf.castShadow=true;shelf.receiveShadow=true;shelfGroup.add(shelf);
}
const shelfSide=new THREE.Mesh(new THREE.BoxGeometry(0.04,2.5,0.35),shelfMat);
for(let sx of[-1,1]){const s=shelfSide.clone();s.position.set(sx*0.5,1.25,0);shelfGroup.add(s);}

// Books
for(let i=0;i<15;i++){
  const bh=0.16+Math.random()*0.18;const bw=0.05+Math.random()*0.06;
  const bookGeo=new THREE.BoxGeometry(bw,bh,0.2);
  const bookMat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.08+Math.random()*0.12,0.3+Math.random()*0.3,0.25+Math.random()*0.35),roughness:0.5});
  const book=new THREE.Mesh(bookGeo,bookMat);
  const row=Math.floor(i/5);
  book.position.set(-0.35+(i%5)*0.14,0.35+row*0.8,-0.02);
  book.castShadow=true;shelfGroup.add(book);
}

// ========== PLANT ==========
const plantGroup=new THREE.Group();plantGroup.position.set(2.8,0,-2.5);room.add(plantGroup);

// Pot
const potGeo=new THREE.CylinderGeometry(0.15,0.12,0.4,16);
const potMat=new THREE.MeshStandardMaterial({color:0xd4956a,roughness:0.5,metalness:0.05});
const pot=new THREE.Mesh(potGeo,potMat);pot.position.y=0.2;pot.castShadow=true;pot.receiveShadow=true;plantGroup.add(pot);

// Leaves
for(let i=0;i<8;i++){
  const leafGeo=new THREE.SphereGeometry(0.15,8,6);leafGeo.scale(1,1.5,0.6);
  const leafMat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.22+Math.random()*0.1,0.5+Math.random()*0.3,0.25+Math.random()*0.2),roughness:0.6});
  const leaf=new THREE.Mesh(leafGeo,leafMat);
  const angle=(i/8)*Math.PI*2;const r=0.18+Math.random()*0.12;
  leaf.position.set(Math.cos(angle)*r,0.45+Math.random()*0.25,Math.sin(angle)*r);
  leaf.rotation.set(Math.random()*0.5,Math.random()*Math.PI*2,Math.random()*0.5);
  leaf.castShadow=true;plantGroup.add(leaf);
}

// ========== STRING LIGHTS ==========
const lightsGroup=new THREE.Group();lightsGroup.position.set(0,3.4,-2);room.add(lightsGroup);
for(let i=0;i<8;i++){
  const bulbGeo=new THREE.SphereGeometry(0.04,8,8);
  const warm=0.4+Math.random()*0.3;
  const bulbMat=new THREE.MeshStandardMaterial({color:0xffcc88,roughness:0.2,emissive:0xff9940,emissiveIntensity:warm*0.35});
  const bulb=new THREE.Mesh(bulbGeo,bulbMat);
  bulb.position.set(-1.5+i*0.4,Math.sin(i*0.8)*0.25,0);lightsGroup.add(bulb);
}
// Wire
const wireCurve=new THREE.CatmullRomCurve3(Array.from({length:20},(_,i)=>new THREE.Vector3(-1.5+i*0.16,Math.sin(i*0.25)*0.2,0)));
const wireGeo=new THREE.TubeGeometry(wireCurve,30,0.008,6,false);
const wire=new THREE.Mesh(wireGeo,new THREE.MeshStandardMaterial({color:0x887766,roughness:0.5}));
lightsGroup.add(wire);

// ========== CAT ==========
const catGroup=new THREE.Group();catGroup.position.set(-0.8,0.01,1.5);room.add(catGroup);
const catFur=new THREE.MeshStandardMaterial({color:0xe89440,roughness:0.7,metalness:0});
const catWhite=new THREE.MeshStandardMaterial({color:0xf5ead8,roughness:0.7,metalness:0});
const catDark=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.2});

// Body
const catBody=new THREE.Mesh(new THREE.CapsuleGeometry(0.12,0.25,6,10),catFur);
catBody.rotation.x=Math.PI/2;catBody.position.y=0.18;catBody.castShadow=true;catGroup.add(catBody);

// White belly
const catBelly=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,6),catWhite);
catBelly.scale.set(1,0.7,0.8);catBelly.position.set(0,0.12,0.04);catGroup.add(catBelly);

// Head
const catHead=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,8),catFur);
catHead.position.set(0,0.3,0.16);catHead.castShadow=true;catGroup.add(catHead);

// Ears
for(let sx of[-1,1]){
  const ear=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.09,6),catFur);
  ear.position.set(sx*0.06,0.38,0.14);
  ear.rotation.z=sx*0.3;ear.rotation.x=-0.2;
  catHead.add(ear);
  // Inner ear
  const innerEar=new THREE.Mesh(new THREE.ConeGeometry(0.03,0.06,6),new THREE.MeshStandardMaterial({color:0xf0b8b0,roughness:0.5}));
  innerEar.position.set(0,-0.01,0.02);ear.add(innerEar);
}

// Eyes
for(let sx of[-1,1]){
  const eyeWhite=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),catWhite);
  eyeWhite.position.set(sx*0.035,0.32,0.24);catHead.add(eyeWhite);
  const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.014,6,6),catDark);
  pupil.position.set(sx*0.035,0.318,0.26);catHead.add(pupil);
}

// Nose
const nose=new THREE.Mesh(new THREE.SphereGeometry(0.012,4,4),new THREE.MeshStandardMaterial({color:0xf0a0a0,roughness:0.3}));
nose.position.set(0,0.29,0.255);catHead.add(nose);

// Legs
for(let sx of[-1,1]){
  for(let sz of[-1,1]){
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.035,0.14,8),catFur);
    leg.position.set(sx*0.07,0.06,sz*0.09);leg.castShadow=true;catGroup.add(leg);
    // White paw
    const paw=new THREE.Mesh(new THREE.SphereGeometry(0.035,6,6),catWhite);
    paw.position.set(sx*0.07,0.01,sz*0.09);catGroup.add(paw);
  }
}

// Tail
const tailGroup=new THREE.Group();tailGroup.position.set(0,0.22,-0.14);catGroup.add(tailGroup);
const tailCurve=new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,0,0),new THREE.Vector3(0,0.08,-0.15),
  new THREE.Vector3(0.02,0.2,-0.22),new THREE.Vector3(0.05,0.3,-0.15),
  new THREE.Vector3(0.06,0.35,-0.05),
]);
const tailGeo=new THREE.TubeGeometry(tailCurve,16,0.025,8,false);
const tail=new THREE.Mesh(tailGeo,catFur);tail.castShadow=true;tailGroup.add(tail);
// White tail tip
const tailTip=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),catWhite);
tailTip.position.set(0.06,0.35,-0.05);tailGroup.add(tailTip);

// Cat AI state
let catState='idle'; // idle | walking | sitting | grooming
let catTimer=0;let catTarget=new THREE.Vector3();let catAnimTime=0;
const catBasePos=catGroup.position.clone();

function updateCat(dt){
  catTimer-=dt;catAnimTime+=dt;

  if(catTimer<=0){
    // Pick new state
    const r=Math.random();
    if(r<0.35)catState='idle';
    else if(r<0.7)catState='walking';
    else if(r<0.9)catState='sitting';
    else catState='grooming';
    catTimer=1.5+Math.random()*4;
    if(catState==='walking'){
      catTarget.set(catBasePos.x+(Math.random()-0.5)*3,0.01,catBasePos.z+(Math.random()-0.5)*2.5);
      catTarget.x=THREE.MathUtils.clamp(catTarget.x,-2.8,2.8);
      catTarget.z=THREE.MathUtils.clamp(catTarget.z,-2.5,2.5);
    }
  }

  // Execute state
  if(catState==='idle'){
    // Subtle breathing + tail swish
    catBody.scale.y=1+Math.sin(catAnimTime*3)*0.03;
  }else if(catState==='walking'){
    // Move toward target
    const dx=catTarget.x-catGroup.position.x;
    const dz=catTarget.z-catGroup.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>0.05){
      const speed=0.6;
      catGroup.position.x+=dx/dist*speed*dt;
      catGroup.position.z+=dz/dist*speed*dt;
      // Rotate toward movement
      const angle=Math.atan2(dx,dz);
      catGroup.rotation.y+=(angle-catGroup.rotation.y)*3*dt;
      // Bob while walking
      catGroup.position.y=0.01+Math.abs(Math.sin(catAnimTime*8))*0.03;
      // Move legs
      catGroup.children.forEach((c,i)=>{
        if(c.geometry&&c.geometry.type==='CylinderGeometry'){
          c.position.y=0.06+Math.sin(catAnimTime*8+i)*0.03;
        }
      });
    }else{catState='idle';catTimer=0.5+Math.random();}
  }else if(catState==='sitting'){
    catGroup.position.y=0.01;
    catBody.rotation.x=Math.PI/2+0.3; // sit up
    catBody.position.y=0.22;
    // Tail wraps around
    tailGroup.rotation.z=0.5+Math.sin(catAnimTime*2)*0.2;
  }else if(catState==='grooming'){
    catHead.rotation.z=Math.sin(catAnimTime*5)*0.4;
    catHead.rotation.x=-0.3;
  }

  // Always: tail swish
  if(catState!=='sitting'){
    tailGroup.rotation.x=0.4+Math.sin(catAnimTime*3)*0.3;
    tailGroup.rotation.z=Math.sin(catAnimTime*2.5)*0.3;
  }

  // Ears twitch
  catHead.children.forEach(c=>{if(c.geometry&&c.geometry.type==='ConeGeometry'){c.rotation.z+=Math.sin(catAnimTime*6)*0.02;}});

  // Reset body when not sitting
  if(catState!=='sitting'){
    catBody.rotation.x+=(Math.PI/2-catBody.rotation.x)*5*dt;
    catBody.position.y+=(0.18-catBody.position.y)*5*dt;
  }
  if(catState!=='grooming'){
    catHead.rotation.z+=(0-catHead.rotation.z)*5*dt;
    catHead.rotation.x+=(0-catHead.rotation.x)*5*dt;
  }
}

// ========== DUST PARTICLES ==========
const dustGroup=new THREE.Group();room.add(dustGroup);
const dustParticles=[];
const dustGeo=new THREE.SphereGeometry(0.015,4,4);
for(let i=0;i<120;i++){
  const mat=new THREE.MeshBasicMaterial({color:0xffeedd,transparent:true,opacity:0.12+Math.random()*0.15,depthWrite:false});
  const d=new THREE.Mesh(dustGeo,mat);
  d.position.set((Math.random()-0.5)*6,Math.random()*3.5,(Math.random()-0.5)*5);
  d.userData={speed:0.002+Math.random()*0.006,phase:Math.random()*Math.PI*2,baseX:d.position.x,baseZ:d.position.z};
  dustGroup.add(d);dustParticles.push(d);
}

// ========== WINDOW LIGHT GLOW SPHERE ==========
const glowGeo=new THREE.SphereGeometry(0.6,16,16);
const glowMat=new THREE.MeshBasicMaterial({color:0xffe8c0,transparent:true,opacity:0.03,depthWrite:false});
const glowSphere=new THREE.Mesh(glowGeo,glowMat);
glowSphere.position.set(-3,2,0.8);room.add(glowSphere);

// ========== ANIMATION ==========
const clock=new THREE.Clock();
let time=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  time+=dt;

  // Gentle camera orbit
  const orbitR=5.5+Math.sin(time*0.15)*1;
  const orbitAngle=0.5+Math.sin(time*0.12)*0.25;
  const targetX=0.4+Math.sin(time*0.18)*0.8;
  camera.position.x+= (Math.cos(orbitAngle)*orbitR-camera.position.x)*0.01;
  camera.position.z+= (Math.sin(orbitAngle)*orbitR-camera.position.z)*0.01;
  camera.position.y+= (2.2+Math.sin(time*0.2)*0.3-camera.position.y)*0.01;
  camera.lookAt(targetX,1.2+Math.sin(time*0.16)*0.15,0);

  // Lamp flicker
  lampLight.intensity=10+Math.sin(time*7)*0.4+Math.sin(time*13)*0.25;
  cozyLight.intensity=4+Math.sin(time*5)*0.25;

  // Dust animation
  dustParticles.forEach(d=>{
    d.position.y+=d.userData.speed;
    d.position.x=d.userData.baseX+Math.sin(time+d.userData.phase)*0.4;
    d.position.z=d.userData.baseZ+Math.cos(time+d.userData.phase)*0.3;
    if(d.position.y>3.5)d.position.y=0;
    d.material.opacity=0.08+Math.sin(time*2+d.userData.phase)*0.08;
  });

  // String light twinkle
  lightsGroup.children.forEach((b,i)=>{
    if(b.geometry&&b.geometry.type==='SphereGeometry'){
      b.material.emissiveIntensity=(0.2+Math.sin(time*3+i)*0.15)*0.35;
    }
  });

  // Glow sphere breathe
  glowSphere.material.opacity=0.05+Math.sin(time*0.8)*0.02;

  // Cat AI
  updateCat(dt);

  composer.render();
}

// ========== START ==========
animate();

// Hide loading
setTimeout(()=>document.getElementById('loading').classList.add('done'),800);

// Resize
window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
});
</script>
</body>
</html>
